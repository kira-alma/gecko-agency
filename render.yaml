services:
  - type: web
    name: geckocheck
    runtime: node
    plan: standard
    buildCommand: npm install && npx playwright install chromium --with-deps && npm run build
    startCommand: npm start
    disk:
      name: geckocheck-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
